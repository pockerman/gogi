apiVersion: apps/v1
kind: Deployment

metadata:
  name: gateway
  namespace: gogi

spec:

  replicas: 2

  selector:
    matchLabels:
      app: gateway

  template:

    metadata:
      labels:
        app: gateway

    spec:

      containers:

      - name: gateway

        image: gogi/gateway:latest

        imagePullPolicy: Never

        ports:

        - containerPort: 50051

        envFrom:

        - configMapRef:
            name: gogi-config

        - secretRef:
            name: gogi-secrets