apiVersion: apps/v1
kind: Deployment

metadata:
  name: llms
  namespace: gogi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llms
  template:
    metadata:
      labels:
        app: llms
    spec:
      containers:
      - name: llms
        image: gogi/llms:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 50057
        envFrom:
        - configMapRef:
            name: gogi-config
        - secretRef:
            name: gogi-secrets