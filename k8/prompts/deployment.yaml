apiVersion: apps/v1
kind: Deployment

metadata:
  name: prompts
  namespace: gogi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prompts
  template:
    metadata:
      labels:
        app: prompts
    spec:
      containers:
      - name: prompts
        image: gogi/prompts:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 50058
        envFrom:
        - configMapRef:
            name: gogi-config
        - secretRef:
            name: gogi-secrets