apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: minio
  namespace: gogi

spec:
  serviceName: minio

  replicas: 1

  selector:
    matchLabels:
      app: minio

  template:
    metadata:
      labels:
        app: minio

    spec:
      containers:
        - name: minio

          image: minio/minio:latest

          args:
            - server
            - /data
            - --console-address
            - ":9001"

          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: gogi-secrets
                  key: MINIO_ROOT_USER

            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gogi-secrets
                  key: MINIO_ROOT_PASSWORD

          ports:
            - containerPort: 9000
              name: api

            - containerPort: 9001
              name: console

          volumeMounts:
            - name: minio-storage
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: minio-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 20Gi