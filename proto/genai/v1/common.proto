syntax = "proto3";

package genai.v1;

option go_package = "gogenai/genai/v1;genaiv1";

message ChatMessage {
  string role = 1;
  string content = 2;

  optional string tool_name = 3;
  optional string tool_call_id = 4;
}

message ChatResponse {
  repeated ChatChoice choices = 1;
}

message ChatChoice {
  int32 index = 1;
  ChatMessage message = 2;
  string finish_reason = 3;
}

message ChatConfig {
  optional float temperature = 1;
  optional int32 max_tokens = 2;
  optional float top_p = 3;
  optional int32 n = 4;

  map<string, string> metadata = 100;
}

message ResponseFormat {
  oneof format {
    JsonSchemaFormat json_schema = 1;
    PlainTextFormat text = 2;
  }
}





message JsonSchemaFormat {
  string schema = 1;
}

message PlainTextFormat {}