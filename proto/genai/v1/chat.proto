syntax = "proto3";

package genai.v1;

option go_package = "gogenai/genai/v1;genaiv1";

import "genai/v1/common.proto";
import "genai/v1/tool.proto";

message ChatRequest {
  ModelSpecifier model = 1;

  repeated ChatMessage messages = 2;

  ChatConfig config = 3;

  repeated ToolDefinition tools = 4;

  optional ResponseFormat response_format = 5;

  bool stream = 6;

  map<string, string> metadata = 100;
}

message ModelSpecifier {
  string name = 1;
  string provider = 2;
}

service ChatService {
  rpc Chat(ChatRequest) returns (ChatResponse);
}



