# gogi[AI] Docker Compose Configuration
# `docker compose up` brings up the seven platform services + a
# pgvector-enabled Postgres on a shared network. The gateway is the only
# service whose ports are mapped to the host (8080 for external HTTP,
# 50051 for the SDK's gRPC channel); everything else is reachable only
# from inside the compose network, by container name (e.g.,
# `sessions:50052`).
#
# Each container runs the same image artifact a platform team would push
# to a registry and reference from a Kubernetes Deployment — see
# `docker/*.Dockerfile`. The compose file maps env vars to the same
# config knobs the production deployment would use.
#
# Once this is up, `genai-platform deploy <file>` (run from the host)
# packages a workflow into its own container and the Workflow Service
# launches it onto the same compose network, so the gateway can route
# traffic to it.

name: gogi
services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gogi
      POSTGRES_USER: gogi
      POSTGRES_PASSWORD: gogi
    ports:
    - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: exact-marine-minio-container
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_REGION=us-east-1
      - MINIO_PORT=9000
    restart: unless-stopped
    ports:
      - 9001:9001
      - 9000:9000
    command: [ "server", "/data", "--console-address", ":9001" ]
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - GOGI_GATEWAY_PORT=:50051
      - GOGI_GATEWAY_PROTOCOL=tcp
      - GOGI_LOG_LEVEL=debug
      - GOGI_SESSION_SERVICE_ADDR=sessions:50052
      - GOGI_WORKFLOW_SERVICE_ADDR=workflows:50053
      - GOGI_DOCUMENT_SERVICE_ADDR=documents:50054
      - GOGI_INDEX_SERVICE_ADDR=indexes:50055
      - GOGI_EMBEDDING_SERVICE_ADDR=embeddings:50056
      - GOGI_LLM_SERVICE_ADDR=llms:50057
      - GOGI_VECTOR_DB_SERVICE_ADDR=vector-db:50059 # TODO Fix this
      - GOGI_PROMPTS_SERVICE_ADDR=prompts:50058
    depends_on:
      - documents
      - indexes
      - postgres
  documents:
    build:  
      context: .
      dockerfile: docker/documents.Dockerfile
    environment:
      - GOGI_LOG_LEVEL=debug
      - GOGI_GATEWAY_URL=gateway:50051
      - GOGI_GATEWAY_INSECURE="1"   # in-cluster gRPC is plaintext
      - GOGI_VECTOR_DB_TYPE=chroma
      - GOGI_VECTOR_DB_HOST=chromadb
      - GOGI_VECTOR_DB_PORT=8000
      - GOGI_INGESTION_DOCUMENT_QUEUE_NAME=ingestion-document-queue
      - TEMPORAL_HOST=host.docker.internal:7233
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - chromadb
  indexes:
    build:  
      context: .
      dockerfile: docker/indexes.Dockerfile
    environment:
      - GOGI_LOG_LEVEL=debug
      - GOGI_GATEWAY_URL=gateway:50051
      - GOGI_GATEWAY_INSECURE="1"   # in-cluster gRPC is plaintext
      - GOGI_VECTOR_DB_TYPE=chroma
      - GOGI_VECTOR_DB_HOST=chromadb
      - GOGI_VECTOR_DB_PORT=8000
    depends_on:
      - postgres
      - chromadb
  llms:
    build:
      context: .
      dockerfile: docker/llms.Dockerfile
    environment:
      - GOGI_LOG_LEVEL=debug
      - GOGI_GATEWAY_URL=gateway:50051
      - GOGI_GATEWAY_INSECURE="1"   # in-cluster gRPC is plaintext
      - GOGI_VECTOR_DB_TYPE=chroma
      - GOGI_VECTOR_DB_HOST=chromadb
      - GOGI_VECTOR_DB_PORT=8000
      - GOGI_LLMS_PORT=:50057
      - ANTHROPIC_API_KEY=1234569878
    depends_on:
      - postgres
      - chromadb
  prompts:
    build:
      context: .
      dockerfile: docker/prompts.Dockerfile
    environment:
      - GOGI_LOG_LEVEL=debug
      - GOGI_GATEWAY_URL=gateway:50051
      - GOGI_GATEWAY_INSECURE="1"   # in-cluster gRPC is plaintext
      - GOGI_PROMPTS_PORT=:50058
      - GOGI_MINIO_HOST=minio:9000 
      - GOGI_MINIO_ROOT_USER=admin
      - GOGI_MINIO_ROOT_PASSWORD=password
    depends_on:
      - postgres

  # The Go Temporal Worker Executes the Go workflow (orchestration)
  # Runs the orchestration logic (IngestDocumentWorkflow)
  ingest-documents-go-worker:
    build:
      context: .
      dockerfile: docker/ingest_document_go_worker.Dockerfile 
    environment:
      - GOGI_LOG_LEVEL=debug
      - TEMPORAL_HOST=host.docker.internal:7233
      - WORK_QUEUE=ingestion-document-queue
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      #- temporal
      - documents # Ensures network is ready
      - postgres
      - chromadb
    restart: unless-stopped
  ingest-documents-python-worker:
    build:
      context: .
      dockerfile: docker/ingest_document_python_worker.Dockerfile 
    environment:
      - TEMPORAL_HOST=host.docker.internal:7233
      - TASK_QUEUE=ingestion-document-queue
      - ACTIVITY_NAME=ingest_document
      - VECTOR_STORAGE_TYPE=chromadb
      - VECTOR_STORAGE_HOST=chromadb
      - VECTOR_STORAGE_PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=gogi
      - DB_USER=gogi
      - DB_PASSWORD=gogi
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - documents
      - postgres
      - chromadb
    restart: unless-stopped
volumes:
  postgres-data:
  chroma-data:
  

